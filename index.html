<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="EverNode is a software studio embedding intelligence into enterprise operations — custom software and AI agents, with the data infrastructure that connects them." />
    <title>EverNode — Engineered systems for the operators building tomorrow.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      body { overflow-x: hidden; }
      body[data-accent="blue"]   { --en-accent: #7CC5FF; --en-accent-glow: rgba(124,197,255,0.35); }
      body[data-accent="lime"]   { --en-accent: #C7FF3D; --en-accent-glow: rgba(199,255,61,0.35); }
      body[data-accent="amber"]  { --en-accent: #FF6B3D; --en-accent-glow: rgba(255,107,61,0.35); }
      body[data-accent="mint"]   { --en-accent: #3DDC97; --en-accent-glow: rgba(61,220,151,0.35); }
      body[data-density="compact"] section { padding-top: 80px !important; padding-bottom: 80px !important; }
      body[data-density="spacious"] section { padding-top: 160px !important; padding-bottom: 160px !important; }
      body[data-display-font="grotesk"] { --en-font-display: "Space Grotesk", system-ui, sans-serif; }
      body[data-display-font="serif"]   { --en-font-display: "EB Garamond", "Times New Roman", serif; }
      body[data-display-font="mono"]    { --en-font-display: "JetBrains Mono", monospace; }
    </style>
  </head>
  <body data-accent="blue" data-density="default" data-display-font="grotesk">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
